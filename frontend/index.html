<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Tic Tac Toe</title>
<meta name="theme-color" content="#1B2430" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <section id="screen-welcome" class="screen active" data-testid="screen-welcome">
    <div class="paper-texture"></div>
    <div class="welcome-content">
      <div class="scorebook-mark">
        <svg viewBox="0 0 100 100" class="hero-grid" aria-hidden="true">
          <line x1="34" y1="8" x2="34" y2="92" class="grid-line" />
          <line x1="66" y1="8" x2="66" y2="92" class="grid-line" />
          <line x1="8" y1="34" x2="92" y2="34" class="grid-line" />
          <line x1="8" y1="66" x2="92" y2="66" class="grid-line" />
        </svg>
      </div>
      <h1 class="title">Tic&nbsp;Tac&nbsp;Toe</h1>
      <p class="subtitle">Grab a friend, or test yourself against the machine.</p>
      <button id="btn-enter" class="btn btn-primary" data-testid="btn-enter">Let's Play</button>
    </div>
  </section>

  <section id="screen-mode" class="screen" data-testid="screen-mode">
    <div class="topbar">
      <button class="btn-back" id="mode-back" aria-label="Back" data-testid="mode-back">&larr;</button>
      <h2 class="screen-title">Choose Your Match</h2>
    </div>
    <div class="mode-cards">
      <button class="mode-card" id="btn-vs-friend" data-testid="btn-vs-friend">
        <span class="mode-icon">✦ ✦</span>
        <span class="mode-name">You &amp; a Friend</span>
        <span class="mode-desc">Pass the phone, take turns, same device</span>
      </button>
      <button class="mode-card" id="btn-vs-computer" data-testid="btn-vs-computer">
        <span class="mode-icon">✦ ⚙</span>
        <span class="mode-name">You vs Computer</span>
        <span class="mode-desc">Pick a difficulty and take on the AI</span>
      </button>
    </div>

    <div id="difficulty-picker" class="difficulty-picker hidden" data-testid="difficulty-picker">
      <p class="difficulty-label">Difficulty</p>
      <div class="difficulty-options">
        <button class="chip" data-difficulty="easy" data-testid="difficulty-easy">Easy</button>
        <button class="chip" data-difficulty="medium" data-testid="difficulty-medium">Medium</button>
        <button class="chip" data-difficulty="hard" data-testid="difficulty-hard">Unbeatable</button>
      </div>
    </div>
  </section>

  <section id="screen-game" class="screen" data-testid="screen-game">
    <div class="topbar">
      <button class="btn-back" id="game-back" aria-label="Back" data-testid="game-back">&larr;</button>
      <h2 class="screen-title" id="game-mode-label">You &amp; a Friend</h2>
      <button class="btn-reset" id="game-reset" aria-label="Restart" data-testid="game-reset">&#8635;</button>
    </div>

    <div class="scoreboard" data-testid="scoreboard">
      <div class="score-pill score-x">
        <span class="score-label" id="label-x">X</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score-pill score-draw">
        <span class="score-label">Draws</span>
        <span class="score-value" id="score-draw">0</span>
      </div>
      <div class="score-pill score-o">
        <span class="score-label" id="label-o">O</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <p class="status-line" id="status-line" data-testid="status-line">X's turn</p>

    <div class="board" id="board" data-testid="board">
    </div>

    <button class="btn btn-secondary hidden" id="btn-play-again" data-testid="btn-play-again">Play Again</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
